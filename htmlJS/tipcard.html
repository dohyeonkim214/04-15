<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tip Calculator Card</title>
  <link rel="stylesheet" href="tipcard.css" />
</head>
<body>
  <main class="page">
    <section class="card" aria-label="Tip calculator">
      <h1 class="title">팁 계산기</h1>

      <label for="priceInput" class="label">음식 가격</label>
      <input
        id="priceInput"
        class="input"
        type="number"
        min="0"
        step="0.01"
        placeholder="예: 25000"
      />

      <p class="label">팁 퍼센트</p>
      <div class="tip-buttons" id="tipButtons">
        <button type="button" class="tip-btn active" data-tip="10">10%</button>
        <button type="button" class="tip-btn" data-tip="15">15%</button>
        <button type="button" class="tip-btn" data-tip="20">20%</button>
      </div>

      <div class="result-wrap">
        <p class="result-label">최종 가격</p>
        <p id="finalPrice" class="result-value">0원</p>
      </div>
    </section>
  </main>

  <script src="tipcard.js"></script>
</body>
</html>
