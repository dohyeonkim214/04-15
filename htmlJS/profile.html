<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Card</title>
  <link rel="stylesheet" href="profile.css" />
</head>
<body>
  <main class="page">
    <section class="card" aria-label="Profile business card">
      <div class="card-left">
        <div class="card-top">
          <p id="eyebrowText" class="eyebrow">BUSINESS PROFILE</p>
          <div class="locale-switch" aria-label="Language switcher">
            <button type="button" class="locale-btn is-active" data-locale="en">EN</button>
            <button type="button" class="locale-btn" data-locale="fr">FR</button>
          </div>
        </div>

        <div class="identity-block">
          <p id="labelName" class="label">NAME</p>
          <h1 id="profileName" class="name"></h1>
        </div>

        <div class="field">
          <p id="labelRole" class="label">ROLE</p>
          <p id="profileRole" class="value"></p>
        </div>

        <div class="field">
          <p id="labelPhone" class="label">PHONE</p>
          <p id="profilePhone" class="value"></p>
        </div>
      </div>

      <div class="card-right">
        <p id="labelQr" class="label">QR CODE</p>
        <div id="contactQr" class="contact-qr" aria-label="Phone contact QR code"></div>
        <p id="qrCaption" class="qr-caption">This QR code adds my phone number to your contacts.</p>
        <p id="qrPhoneNote" class="qr-phone-note"></p>
      </div>
    </section>
  </main>

  <script type="module" src="profile.js"></script>
</body>
</html>
